version: "3.9"

# ── CrisisEcho — full local stack ─────────────────────────────────────────────
# Usage:
#   fill in .env (all API keys are already listed there)
#   place Aiven TLS certs in certs/ (ca.pem, service.cert, service.key)
#   docker compose up --build

services:

  # ── Python AI pipeline sidecar ───────────────────────────────────────────────
  crisisecho-sidecar:
    build:
      context: .                    # project root so certs/ is reachable
      dockerfile: sidecar/Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      # When running in compose the sidecar POSTs source posts to the Go API
      # container name instead of localhost.
      GO_API_BASE: http://crisisecho-api:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s   # allow time for ML model loading on first start
    restart: unless-stopped

  # ── Go API ───────────────────────────────────────────────────────────────────
  crisisecho-api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Point the Go API at the sidecar container name.
      PYTHON_SIDECAR_URL: http://crisisecho-sidecar:8081
    volumes:
      - ./config/firebase-admin.json:/app/config/firebase-admin.json:ro
    depends_on:
      crisisecho-sidecar:
        condition: service_healthy
    restart: unless-stopped
